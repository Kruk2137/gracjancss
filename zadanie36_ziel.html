<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zadanie 36</title>

<style>
    body {
        background-color: lightgray;
        text-align: center;
        border: 5px solid hotpink;
        padding: 20px;
    }

    h1 {
        background-color: yellow;
        border: 3px solid black;
        padding: 10px;
        width: 60%;
        margin: 20px auto;
    }

    h2 {
        background-color: #cc6666;
        border-top: 4px dashed red;
        border-bottom: 4px solid blue;
        border-left: 4px dotted black;
        border-right: 4px double green;
        padding: 10px;
        width: 60%;
        margin: 20px auto;
    }

    h3 {
        background-color: #6688cc;
        border-top: 5px groove red;
        border-bottom: 5px ridge blue;
        border-left: 5px inset black;
        border-right: 5px outset green;
        padding: 10px;
        width: 60%;
        margin: 20px auto;
    }

    .hr1 {
        width: 80%;
        height: 2px;
        background-color: black;
    }

    .hr2 {
        width: 60%;
        height: 4px;
        background-color: gray;
    }

    .hr3 {
        width: 40%;
        height: 6px;
        background-color: darkgray;
    }
</style>

</head>
<body>

<h1>To jest przykład</h1>
<hr class="hr1">

<h2>To jest przykład wykonaj sam</h2>
<hr class="hr2">

<h3>To jest przykład wykonaj również</h3>
<hr class="hr3">

</body>
</html>
