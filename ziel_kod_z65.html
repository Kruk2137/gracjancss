    <div id="pierwszy_zielewski">
        <p>Pierwszy akapit/pierwszy DIV--> nazwisko ucznia np. Zielewski nazwa ID akapitu id="pierwszy_zielewski"</p>
        <p>Drugi akapit/pierwszy DIV<br>pierwszy akapit --> p:first-child {font-size:7mm;font-style:italic;} bo numer nieparzysty w dzienniku<br>pozostałe akapity --> p{font-size:11pt;} bo numer nieparzysty<br>szerokość bloku = 700+29*4=816pt<br>pierwszy DIV--> kolor różowy</p>
        <p>trzeci akapit/pierwszy DIV<br>pierwszy DIV--> obramowanie fioletowe DIV<br>pierwszy DIV--> obramowanie grubość 7px, ciągłe (solid)<br>pierwszy DIV--> r1=7+7(Gracjan)=14px</p>
    </div>

    <div id="drugi_zielewski">
        <p>Pierwszy akapit/drugi DIV--> imię ucznia np. Gracjan nazwa ID akapitu id="drugi_zielewski"</p>
        <p>Drugi akapit/drugi DIV<br>drugi DIV--> kolor jasnozielony</p>
        <p>trzeci akapit/drugi DIV<br>drugi DIV--> obramowanie czarne DIV<br>drugi DIV--> obramowanie grubość 3px, ciągłe (solid)<br>drugi DIV--> r2=7+9(Zielewski)=16px</p>
    </div>

   <div id="trzeci_zielewski">
        <p>Pierwszy akapit/trzeci DIV--> klasa ucznia np. 1kp nazwa ID akapitu id="trzeci_zielewski"</p>
        <p>Drugi akapit/trzeci DIV<br>trzeci DIV--> kolor jasnoniebieski</p>
        <p>trzeci akapit/trzeci DIV(solid)<br>trzeci DIV--> obramowanie granatowe DIV<br>trzeci DIV--> obramowanie grubość 5px, ciągłe (solid)<br>trzeci DIV--> r3=7+7(lipiec)=14px</p>
    </div>
